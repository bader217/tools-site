<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Register</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="display:flex; align-items:center; justify-content:center; min-height:100vh; background:#0a0a0a;">

    <div class="login-window">
        <div class="login-window-bar">
            <span class="login-window-title">ADMIN REGISTER</span>
        </div>
        <div class="login-window-body">
            <div id="errorMsg" style="display:none" class="login-error-msg">CREATE FAILED</div>
            <form method="POST" action="/admin/register">
                <div class="login-form-group">
                    <label>USERNAME</label>
                    <input type="text" name="username" placeholder="admin" required autocomplete="username">
                </div>
                <div class="login-form-group">
                    <label>PASSWORD</label>
                    <input type="password" name="password" placeholder="••••••••" required autocomplete="new-password">
                </div>
                <button type="submit" class="login-btn">REGISTER</button>
            </form>
            <a href="/admin/login" class="login-back-link">← BACK TO LOGIN</a>
        </div>
    </div>

    <script>
        if (window.location.search.includes('error=1')) {
            let el = document.getElementById('errorMsg');
            el.style.display = 'block';
        }
    </script>

</body>
</html>
